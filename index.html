<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Party & Event Rentals</title>
    <style>
        /* This is the CSS section */
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f9f9f9; text-align: center; }
        header { background-color: #333; color: white; padding: 2rem; }
        .services-container { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; padding: 40px; }
        .service-card { background: white; border: 1px solid #ddd; border-radius: 8px; width: 300px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .service-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .price { display: block; font-weight: bold; color: #2c3e50; margin: 10px; }
        button { background-color: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        form { background: white; padding: 20px; display: inline-block; border-radius: 8px; margin-top: 20px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <header>
        <h1>Party & Event Rentals</h1>
        <p>Chairs, Tables, and Elegant Decor for Your Big Day</p>
    </header>

    <section class="services-container">
        <div class="service-card">
            <h3>Chair Rentals</h3>
            <p>From folding chairs to elegant styles.</p>
            <span class="price">Starting at $2.50/ea</span>
            <button class="rent-btn">Inquire Now</button>
        </div>
        <div class="service-card">
            <h3>Table Rentals</h3>
            <p>Round, rectangular, and high-top tables.</p>
            <span class="price">Starting at $10.00/ea</span>
            <button class="rent-btn">Inquire Now</button>
        </div>
    </section>

    <form id="contact-form">
        <h3>Send Booking Request</h3>
        <label>Rental Date:</label> <input type="date"> <br><br>
        <label>Equipment Needed:</label> <textarea placeholder="e.g. 50 chairs"></textarea> <br><br>
        <button type="button" onclick="alert('Request Sent!')">Send Request</button>
    </form>

    <script>
        // This is the JavaScript section
        document.querySelectorAll('.rent-btn').forEach(button => {
            button.addEventListener('click', () => {
                document.getElementById('contact-form').scrollIntoView({behavior: 'smooth'});
            });
        });
    </script>
</body>
</html>
